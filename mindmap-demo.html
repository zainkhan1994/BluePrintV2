<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Mind Map Demo - Blueprint Visualizer</title>
    <link rel="stylesheet" href="styles/mindmap.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        
        .demo-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        
        .demo-header h1 {
            color: #ffffff;
            font-size: 20px;
            margin: 0;
            font-weight: 600;
        }
        
        .demo-header .nav-links {
            display: flex;
            gap: 15px;
        }
        
        .demo-header a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .demo-header a:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }
        
        #mindmap-viewer {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
        }
        
        @media (max-width: 768px) {
            .demo-header h1 {
                font-size: 16px;
            }
            
            .demo-header .nav-links {
                gap: 10px;
            }
            
            .demo-header a {
                font-size: 12px;
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="demo-header">
        <h1><i class="fas fa-project-diagram"></i> Interactive Mind Map Demo</h1>
        <div class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i> Main App</a>
            <a href="logo_map.html"><i class="fas fa-th"></i> Logo Map</a>
        </div>
    </div>
    
    <div id="mindmap-viewer"></div>

    <!-- MindMapViewer - Pure JavaScript implementation -->
    <script src="MindMapViewer.js"></script>
    
    <script>
        // Initialize the mind map viewer
        let viewer;
        
        async function initMindMap() {
            try {
                // Load the sample data
                const response = await fetch('data/sample-mindmap.json');
                const data = await response.json();
                
                // Create viewer instance
                viewer = new MindMapViewer('mindmap-viewer', {
                    initialZoom: 0.8,
                    minZoom: 0.1,
                    maxZoom: 4,
                    showLabels: true,
                    nodeRadius: 20,
                    linkDistance: 120,
                    enableKeyboard: true,
                    enableTouch: true,
                    onNodeClick: (node) => {
                        console.log('Node clicked:', node);
                    }
                });
                
                // Load the data
                viewer.loadData(data);
                
                console.log('Mind map initialized successfully!');
            } catch (error) {
                console.error('Error initializing mind map:', error);
                document.getElementById('mindmap-viewer').innerHTML = `
                    <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: #ffffff; flex-direction: column; gap: 20px;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #ff6b6b;"></i>
                        <p style="font-size: 18px;">Failed to load mind map data</p>
                        <p style="font-size: 14px; opacity: 0.7;">${error.message}</p>
                    </div>
                `;
            }
        }
        
        // Initialize on page load
        window.addEventListener('DOMContentLoaded', initMindMap);
        
        // Clean up on page unload
        window.addEventListener('beforeunload', () => {
            if (viewer) {
                viewer.destroy();
            }
        });
    </script>
</body>
</html>
